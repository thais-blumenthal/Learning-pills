<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mixed-Media Lesson Layouts</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400..700&family=Nunito:ital,wght@0,400..900;1,400..700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'Nunito', sans-serif; }

  /* unicorn theme tokens scoped to the reader frames */
  .rdr {
    --surface: #ffffff; --surface-2: #fbf6ff; --text: #2a1b46; --text-dim: #8b7aa8;
    --border-solid: #ece0fb; --track: #2a1b4612;
    --accent: #d6249f; --accent-2: #1fb6d6; --accent-soft: rgba(214,36,159,.12);
    --grad: linear-gradient(135deg,#ff5fa2 0%,#a855f7 50%,#22b8d6 100%);
    --grad-text: linear-gradient(120deg,#ff3d97,#a855f7 45%,#16a5c9);
    font-family: 'Nunito', sans-serif; color: var(--text);
    width: 100%; height: 100%; background: var(--surface);
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* top bar */
  .rdr-bar { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-bottom: 1px solid var(--border-solid); }
  .rdr-close { font-size: 13px; font-weight: 700; color: var(--text-dim); white-space: nowrap; }
  .rdr-prog { flex: 1; display: flex; gap: 4px; }
  .rdr-seg { flex: 1; height: 6px; border-radius: 4px; background: var(--track); }
  .rdr-seg.on { background: var(--grad); }
  .rdr-time { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

  .rdr-body { flex: 1; padding: 22px; overflow: hidden; }
  .rdr-note { padding: 12px 18px; border-top: 1px dashed var(--border-solid); font-size: 12.5px; color: var(--text-dim); background: var(--surface-2); }

  /* reader content */
  .r-step { font-family: 'Fredoka', sans-serif; font-size: 11.5px; font-weight: 600; letter-spacing: .14em;
    background: var(--grad-text); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .r-title { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 30px; line-height: 1.04; margin: 8px 0 0;
    background: var(--grad-text); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .r-hook { font-size: 17px; line-height: 1.42; margin-top: 12px; color: var(--text); text-wrap: pretty; }
  .r-points { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
  .r-point { display: flex; gap: 11px; align-items: flex-start; font-size: 15px; line-height: 1.4; }
  .r-dot { flex-shrink: 0; width: 9px; height: 9px; border-radius: 50%; background: var(--grad); margin-top: 6px; }
  .r-take { margin-top: 18px; display: flex; flex-direction: column; gap: 5px; border-left: 3px solid transparent;
    border-image: var(--grad) 1; padding: 2px 0 2px 16px; font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 17px; line-height: 1.3; }
  .r-take-l { font-family: 'Nunito', sans-serif; font-size: 10.5px; font-weight: 800; letter-spacing: .14em; color: var(--accent); }

  /* analogy box */
  .r-analogy { margin-top: 18px; border-radius: 18px; padding: 18px;
    background: linear-gradient(135deg, color-mix(in oklch, var(--accent) 14%, var(--surface)), color-mix(in oklch, var(--accent-2) 14%, var(--surface)));
    border: 1px solid color-mix(in oklch, var(--accent) 24%, transparent); }
  .r-an-label { font-size: 10.5px; font-weight: 800; letter-spacing: .14em; color: var(--accent); margin-bottom: 10px; }
  .r-analogy p { font-size: 15px; line-height: 1.45; }

  /* figure */
  .r-fig { margin: 18px 0; }
  .r-fig figcaption { font-size: 12px; color: var(--text-dim); margin-top: 8px; padding-left: 2px; }

  /* split */
  .r-split { display: flex; gap: 14px; align-items: stretch; margin-top: 16px; }
  .r-split-text { flex: 1; display: flex; align-items: center; }
  .r-split-text .r-hook { margin-top: 0; font-size: 16px; }

  /* gallery */
  .r-gallery { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
  .r-gallery-hint { font-size: 12px; color: var(--text-dim); margin-top: 10px; font-weight: 700; }

  /* media placeholders */
  .ph { position: relative; display: grid; place-items: center; overflow: hidden;
    background:
      repeating-linear-gradient(135deg, color-mix(in oklch, var(--accent) 9%, transparent) 0 12px, transparent 12px 24px),
      var(--surface-2);
    border: 1.5px dashed color-mix(in oklch, var(--accent) 32%, transparent); }
  .ph-label { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 11.5px; letter-spacing: .03em;
    color: var(--text-dim); background: var(--surface); padding: 5px 11px; border-radius: 999px; border: 1px solid var(--border-solid); }
  .ph.video { background:
      repeating-linear-gradient(135deg, color-mix(in oklch, var(--accent-2) 12%, transparent) 0 12px, transparent 12px 24px),
      linear-gradient(135deg, color-mix(in oklch, var(--accent) 16%, var(--surface-2)), var(--surface-2));
    border-style: solid; border-color: color-mix(in oklch, var(--accent-2) 36%, transparent); }
  .ph-play { position: absolute; width: 54px; height: 54px; border-radius: 50%; display: grid; place-items: center;
    background: var(--grad); box-shadow: 0 10px 26px -8px color-mix(in oklch, var(--accent) 70%, transparent); }
  .ph-play svg { margin-left: 3px; }
  .ph-dur { position: absolute; right: 10px; bottom: 10px; font-family: ui-monospace, monospace; font-size: 11px;
    color: #fff; background: rgba(20,10,40,.6); padding: 4px 9px; border-radius: 999px; }
  .ph-label.vid { position: absolute; left: 10px; top: 10px; }

  /* ===== progress as a single fill ===== */
  .rdr-fill { display: block; height: 100%; border-radius: 4px; background: var(--grad); }

  /* ===== lesson body spacing ===== */
  .lesson { display: flex; flex-direction: column; }
  .lesson .r-step { margin-bottom: 0; }
  .lesson .r-title { margin: 8px 0 6px; }

  /* a single content block */
  .lblock { padding: 14px 0; border-bottom: 1px dashed var(--border-solid); }
  .lblock:last-of-type { border-bottom: none; }
  .lp { font-size: 16px; line-height: 1.5; color: var(--text); text-wrap: pretty; }

  /* kind tag — paces the lesson */
  .ktag { display: inline-flex; align-items: center; gap: 6px; font-family: 'Fredoka', sans-serif; font-weight: 600;
    font-size: 11px; letter-spacing: .12em; padding: 5px 11px; border-radius: 999px; margin-bottom: 11px; }
  .ktag-ic { font-size: 11px; }
  .ktag-hint { font-family: 'Nunito', sans-serif; font-weight: 700; letter-spacing: .02em; opacity: .8; }
  .ktag.read  { background: color-mix(in oklch, #a855f7 14%, transparent); color: #8b3fd6; }
  .ktag.look  { background: color-mix(in oklch, #1fb6d6 16%, transparent); color: #0f8aa8; }
  .ktag.watch { background: color-mix(in oklch, #d6249f 14%, transparent); color: #c01f8e; }
  .ktag.do    { background: color-mix(in oklch, #1f9e74 16%, transparent); color: #198a64; }

  /* video caption */
  .vcap { font-size: 13px; color: var(--text-dim); margin-top: 9px; font-weight: 600; }

  /* ===== clickable loop diagram ===== */
  .loop { }
  .loop-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .loop-node { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 12px 6px; min-width: 78px; flex: 1;
    border-radius: 14px; background: var(--surface-2); border: 1.5px solid var(--border-solid); cursor: pointer; transition: all .16s; }
  .loop-node:hover { border-color: var(--accent-2); transform: translateY(-1px); }
  .loop-node.on { background: var(--grad); border-color: transparent; box-shadow: 0 8px 20px -8px color-mix(in oklch, var(--accent) 60%, transparent); }
  .loop-node.on .ln-num, .loop-node.on .ln-k { color: #fff; }
  .ln-num { width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; font-family: 'Fredoka', sans-serif;
    font-weight: 600; font-size: 12px; background: var(--surface); color: var(--accent); }
  .loop-node.on .ln-num { background: rgba(255,255,255,.25); }
  .ln-k { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 14px; color: var(--text); }
  .loop-arr { color: var(--text-dim); font-size: 16px; }
  .loop-repeat { display: grid; place-items: center; width: 30px; height: 30px; border-radius: 50%; font-size: 16px;
    color: var(--accent-2); border: 1.5px dashed var(--accent-2); }
  .loop-exp { margin-top: 12px; font-size: 14.5px; line-height: 1.45; color: var(--text);
    background: var(--surface-2); border-radius: 12px; padding: 12px 14px; }
  .loop-exp b { color: var(--accent); }

  /* ===== inline quick check ===== */
  .qcheck { }
  .qc-q { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 16px; line-height: 1.3; margin-bottom: 12px; }
  .qc-opts { display: flex; flex-direction: column; gap: 8px; }
  .qc-opt { display: flex; align-items: center; gap: 11px; text-align: left; font-size: 14.5px; padding: 12px 14px;
    border: 1.5px solid var(--border-solid); border-radius: 12px; background: var(--surface-2); cursor: pointer; transition: all .14s; font-family: 'Nunito', sans-serif; color: var(--text); }
  .qc-opt:hover { border-color: var(--accent-2); }
  .qc-mark { flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border-solid); }
  .qc-opt.sel .qc-mark { border-color: var(--accent); background: var(--accent); }
  .qc-opt.ok { border-color: #1f9e74; background: color-mix(in oklch, #1f9e74 12%, var(--surface-2)); }
  .qc-opt.ok .qc-mark { border-color: #1f9e74; background: #1f9e74; }
  .qc-opt.no { border-color: #d8553f; background: color-mix(in oklch, #d8553f 10%, var(--surface-2)); }

  /* callout */
  .callout { border-radius: 16px; padding: 16px;
    background: linear-gradient(135deg, color-mix(in oklch, var(--accent) 13%, var(--surface)), color-mix(in oklch, var(--accent-2) 13%, var(--surface)));
    border: 1px solid color-mix(in oklch, var(--accent) 22%, transparent); }
  .callout-l { font-size: 10.5px; font-weight: 800; letter-spacing: .14em; color: var(--accent); margin-bottom: 8px; }
  .callout p { font-size: 14.5px; line-height: 1.45; }

  /* ===== block-kit cards ===== */
  .kit { display: flex; flex-direction: column; height: 100%; }
  .kit-head { display: flex; align-items: center; gap: 10px; font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 15px;
    color: var(--text); padding: 14px 16px; border-bottom: 1px solid var(--border-solid); }
  .kit-head .ktag { margin-bottom: 0; }
  .kit-body { padding: 16px; }
</style>
</head>
<body>
<div id="root"></div>
